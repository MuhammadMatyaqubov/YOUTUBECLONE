<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Clone</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
background:#0f0f0f;
color:white;
overflow-x:hidden;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#202020;
position:sticky;
top:0;
z-index:1000;
gap:10px;
}

.logo{font-size:28px;font-weight:bold;color:red;}

.search-box{display:flex;width:50%;max-width:700px;}

.search-box input{
width:100%;
padding:12px;
border:none;
outline:none;
font-size:16px;
border-radius:20px 0 0 20px;
}

.search-box button{
padding:12px 20px;
border:none;
background:red;
color:white;
cursor:pointer;
border-radius:0 20px 20px 0;
}

.section-title{font-size:24px;padding:20px;}

.shorts-container{
display:flex;
gap:15px;
overflow-x:auto;
padding:0 20px 20px;
}

.short-card{
min-width:200px;
height:360px;
background:#202020;
border-radius:20px;
overflow:hidden;
cursor:pointer;
position:relative;
}

.short-card img{width:100%;height:100%;object-fit:cover;}

.short-info{
position:absolute;
bottom:0;
left:0;
width:100%;
padding:12px;
background:linear-gradient(transparent,rgba(0,0,0,0.9));
}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#202020;
border-radius:15px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.info{padding:12px;}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.player-box{
width:90%;
max-width:1200px;
aspect-ratio:16/9;
position:relative;
}

iframe{
width:100%;
height:100%;
border:none;
}

.close{
position:absolute;
top:-60px;
right:0;
width:45px;
height:45px;
border:none;
border-radius:50%;
background:red;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<div class="logo">YouTube Clone</div>
<div class="search-box">
<input id="searchInput" placeholder="Qidirish...">
<button onclick="searchVideos()">Search</button>
</div>
</header>

<h2 class="section-title">Shorts</h2>
<div class="shorts-container" id="shortsList"></div>

<h2 class="section-title">Videos</h2>
<div class="container" id="videoList"></div>

<div class="popup" id="popup" onclick="outsideClose(event)">
<div class="player-box">
<button class="close" onclick="closeVideo()">✕</button>
<iframe id="player" allow="autoplay"></iframe>
</div>
</div>

<script>

/* ================= VIDEOS (KANALLAR) ================= */
const videos = [

/* KOMPOt */
{ id:"dQw4w9WgXcQ", title:"Kompot Survival", channel:"Kompot" },
{ id:"hHW1oY26kxQ", title:"Kompot Minecraft", channel:"Kompot" },
{ id:"3JZ_D3ELwOQ", title:"Kompot Hardcore", channel:"Kompot" },

/* XAYZEN */
{ id:"JGwWNGJdvx8", title:"Xayzen PUBG Rush", channel:"Xayzen" },
{ id:"kJQP7kiw5Fk", title:"Xayzen Clutch", channel:"Xayzen" },
{ id:"oRdxUFDoQe0", title:"Xayzen Ranked", channel:"Xayzen" },

/* ZETIK */
{ id:"fRh_vgS2dFE", title:"Zetik Minecraft Build", channel:"Zetik" },
{ id:"OPf0YbXqDm0", title:"Zetik Survival", channel:"Zetik" },
{ id:"RgKAFK5djSk", title:"Zetik Mining", channel:"Zetik" },

/* VETREL */
{ id:"tAGnKpE4NCI", title:"Vetrel Roblox Obby", channel:"Vetrel" },
{ id:"LXb3EKWsInQ", title:"Vetrel Funny", channel:"Vetrel" },
{ id:"ScMzIvxBSi4", title:"Vetrel Escape", channel:"Vetrel" },

/* V1ZOR */
{ id:"i0p1bmr0EmE", title:"V1zor PUBG Highlights", channel:"V1zor" },
{ id:"YQHsXMglC9A", title:"V1zor Sniper", channel:"V1zor" },
{ id:"e-ORhEE9VVg", title:"V1zor Squad Wipe", channel:"V1zor" },

/* FIXEYE ROBLOX */
{ id:"60ItHLz5WEA", title:"FixEye Roblox Obby", channel:"FixEye Roblox" },
{ id:"Z9eMk051dYg", title:"FixEye Parkour", channel:"FixEye Roblox" },
{ id:"CevxZvSJLk8", title:"FixEye Horror Map", channel:"FixEye Roblox" }

];

/* ================= SHORTS ================= */
const shorts = [

{ id:"jNQXAC9IVRw", title:"Kompot Clip", channel:"Kompot Shorts" },
{ id:"aqz-KE-bpKQ", title:"Xayzen Kill", channel:"Xayzen Shorts" },
{ id:"ScMzIvxBSi4", title:"Zetik Build", channel:"Zetik Shorts" },
{ id:"LXb3EKWsInQ", title:"Vetrel Funny", channel:"Vetrel Shorts" },
{ id:"hHW1oY26kxQ", title:"V1zor Clutch", channel:"V1zor Shorts" },
{ id:"kJQP7kiw5Fk", title:"FixEye Escape", channel:"FixEye Shorts" }

];

/* RENDER */
function renderVideos(){
document.getElementById("videoList").innerHTML =
videos.map(v=>`
<div class="card" onclick="openVideo('${v.id}')">
<img src="https://img.youtube.com/vi/${v.id}/hqdefault.jpg">
<div class="info">
<h3>${v.title}</h3>
<p>${v.channel}</p>
</div>
</div>
`).join("");
}

function renderShorts(){
document.getElementById("shortsList").innerHTML =
shorts.map(v=>`
<div class="short-card" onclick="openVideo('${v.id}')">
<img src="https://img.youtube.com/vi/${v.id}/hqdefault.jpg">
<div class="short-info">
<h3>${v.title}</h3>
<p>${v.channel}</p>
</div>
</div>
`).join("");
}

renderVideos();
renderShorts();

/* PLAYER */
function openVideo(id){
document.getElementById("popup").style.display="flex";
document.getElementById("player").src=
`https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
}

function closeVideo(){
document.getElementById("popup").style.display="none";
document.getElementById("player").src="";
}

function outsideClose(e){
if(e.target.id==="popup") closeVideo();
}

/* SEARCH */
function searchVideos(){
let val=document.getElementById("searchInput").value.toLowerCase();

document.querySelectorAll(".card,.short-card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(val)?"block":"none";
});
}

</script>

</body>
</html>
